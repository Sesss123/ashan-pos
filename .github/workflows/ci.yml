name: Enterprise ERP CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - run: cd backend && npm ci
    - run: cd backend && npx prisma generate
    # - run: cd backend && npm test # Uncomment when tests are written

  admin-web-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
    - run: cd admin-web && npm ci
    - run: cd admin-web && npm run build

  docker-build:
    needs: [backend-test, admin-web-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Build and push Docker images
      run: |
        echo "Docker build step placeholder for Production ECR/DockerHub"
